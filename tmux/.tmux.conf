set-environment -g PATH "/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/bin:/usr/bin:$PATH"

# set shell
set -g default-shell /bin/zsh

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# set scrollback buffer for history
set -g history-limit 10000

set -g focus-events on

####################
#### key bindings
####################
# synchronize all panes in a window
unbind C-y
bind C-y set-window-option synchronize-panes

# remap prefix from 'C-b' to 'C-f'
unbind C-b
unbind C-f
set-option -g prefix C-f
bind-key C-f send-prefix

####################
#### Tokyo Night statusline
####################
# palette (from ~/.pi/agent/themes/tokyo-night-storm.json)
#   bg #1a1b26  block #24283b  raised #2f3447  border #3b4261
#   fg #c0caf5  muted #a9b1d6  dim #565f89  dark #414868
#   blue #7aa2f7  cyan #7dcfff  green #9ece6a  yellow #e0af68
#   purple #bb9af7  red #f7768e  orange #ff9e64
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 60
set -g status-right-length 150
set -g status-justify left

# refresh the status line frequently so the Pi token segment stays live
set -g status-interval 2

# Left: tmux session — blue powerline block
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26,nobold]"

# Right: clock only. Pi token usage + ≈$ cost live inside Pi itself via the
# pi-powerline-footer extension (Tokyo Night theme: pi-powerline-footer/theme.json)
# plus a pi-cost-estimate extension that layers an ≈$ gauge via setStatus.
set -g status-right "#[fg=#a9b1d6,bg=#414868] %Y-%m-%d %H:%M "

# Windows — powerline segments (separator \ue0b0 lives in the Nerd Font)
set -g window-status-separator ""
# inactive: muted pill on a raised block colour
set -g window-status-format "#[fg=#24283b,bg=#1a1b26]#[fg=#a9b1d6,bg=#24283b] #I  #W #[fg=#1a1b26,bg=#24283b]"
# active: cyan powerline block, dark bold text
set -g window-status-current-format "#[fg=#7dcfff,bg=#1a1b26]#[fg=#1a1b26,bg=#7dcfff,bold] #I  #W #[fg=#1a1b26,bg=#7dcfff,nobold]"

####################
#### pane borders
####################
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7dcfff"
set -g pane-border-indicators colour
set -g pane-border-lines single

# Per-pane header showing index · command · path.
# Gated: only enabled when a window has >=2 panes, so single-pane windows
# keep their full height. The hook toggles pane-border-status on layout change.
set -g pane-border-status off
set-hook -g window-layout-changed 'if -F "#{==:#{window_panes},1}" "setw pane-border-status off" "setw pane-border-status top"'
# NOTE: single-attribute #[..] chains inside the conditional avoid the tmux
# gotcha where commas in #[fg=..,bg=..] break #{?cond,then,else} parsing.
set -g pane-border-format '#{?pane_active,#[fg=#1a1b26]#[bg=#7dcfff]#[bold]  #[fg=#a9b1d6]#[bg=#1a1b26]#[nobold] #{pane_index} #[fg=#565f89]· #[fg=#7dcfff]#{pane_current_command} #[fg=#565f89] #[fg=#a9b1d6]#[italics] #{b:pane_current_path},#[fg=#565f89]#[bg=#1a1b26]  #[fg=#a9b1d6] #{pane_index} #[fg=#565f89]· #[fg=#a9b1d6]#{pane_current_command} #[fg=#565f89] #[fg=#565f89]#[italics] #{b:pane_current_path}}'

####################
#### messages / modes
####################
set -g message-style "bg=#7aa2f7,fg=#1a1b26"
set -g message-command-style "fg=#a9b1d6,bg=#414868"
set -g mode-style "fg=#73daca,bg=#414868"

####################
#### pi
####################
set -g extended-keys on
set -g extended-keys-format csi-u

####################
#### plugins
####################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'